syntax = "proto3";

package wireguide;

option go_package = "github.com/korjwl1/wireguide/internal/ipc/proto";

// WireGuide daemon service.
service WireGuideService {
  // Tunnel operations
  rpc Connect(ConnectRequest) returns (ConnectResponse);
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);
  rpc ListTunnels(ListTunnelsRequest) returns (ListTunnelsResponse);
  rpc GetTunnelDetail(GetTunnelDetailRequest) returns (TunnelDetail);

  // Real-time status streaming (replaces polling)
  rpc StreamStatus(StreamStatusRequest) returns (stream ConnectionStatus);

  // Config management
  rpc ImportConfig(ImportConfigRequest) returns (ImportConfigResponse);
  rpc ValidateConfig(ValidateConfigRequest) returns (ValidateConfigResponse);
  rpc GetConfigText(GetConfigTextRequest) returns (GetConfigTextResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc DeleteTunnel(DeleteTunnelRequest) returns (DeleteTunnelResponse);
  rpc ExportConfig(ExportConfigRequest) returns (ExportConfigResponse);
  rpc TunnelExists(TunnelExistsRequest) returns (TunnelExistsResponse);

  // Settings
  rpc GetSettings(GetSettingsRequest) returns (Settings);
  rpc SaveSettings(Settings) returns (SaveSettingsResponse);

  // Firewall (Phase 2)
  rpc SetKillSwitch(SetKillSwitchRequest) returns (SetKillSwitchResponse);
  rpc SetDNSProtection(SetDNSProtectionRequest) returns (SetDNSProtectionResponse);

  // Daemon management
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

// --- Tunnel ---

message ConnectRequest {
  string tunnel_name = 1;
  bool scripts_allowed = 2;
}
message ConnectResponse {}

message DisconnectRequest {}
message DisconnectResponse {}

message ListTunnelsRequest {}
message ListTunnelsResponse {
  repeated TunnelInfo tunnels = 1;
}

message TunnelInfo {
  string name = 1;
  bool is_connected = 2;
  string endpoint = 3;
  bool has_scripts = 4;
}

message GetTunnelDetailRequest {
  string name = 1;
}

message TunnelDetail {
  string name = 1;
  InterfaceConfig interface_config = 2;
  repeated PeerConfig peers = 3;
}

message InterfaceConfig {
  repeated string address = 1;
  repeated string dns = 2;
  int32 mtu = 3;
  int32 listen_port = 4;
  string pre_up = 5;
  string post_up = 6;
  string pre_down = 7;
  string post_down = 8;
}

message PeerConfig {
  string public_key = 1;
  string endpoint = 2;
  repeated string allowed_ips = 3;
  int32 persistent_keepalive = 4;
  bool has_preshared_key = 5;
}

// --- Status streaming ---

message StreamStatusRequest {}

message ConnectionStatus {
  string state = 1;           // disconnected, connecting, connected, error, reconnecting
  string tunnel_name = 2;
  string interface_name = 3;
  int64 rx_bytes = 4;
  int64 tx_bytes = 5;
  string last_handshake = 6;  // human-readable age
  string duration = 7;        // human-readable duration
  string endpoint = 8;
  string error_message = 9;
  int32 reconnect_attempt = 10;
}

// --- Config management ---

message ImportConfigRequest {
  string name = 1;
  string content = 2;
}
message ImportConfigResponse {
  TunnelInfo tunnel = 1;
}

message ValidateConfigRequest {
  string content = 1;
}
message ValidateConfigResponse {
  repeated string errors = 1;
}

message GetConfigTextRequest {
  string name = 1;
}
message GetConfigTextResponse {
  string content = 1;
}

message UpdateConfigRequest {
  string name = 1;
  string content = 2;
}
message UpdateConfigResponse {}

message DeleteTunnelRequest {
  string name = 1;
}
message DeleteTunnelResponse {}

message ExportConfigRequest {
  string name = 1;
}
message ExportConfigResponse {
  string content = 1;
}

message TunnelExistsRequest {
  string name = 1;
}
message TunnelExistsResponse {
  bool exists = 1;
}

// --- Settings ---

message Settings {
  string language = 1;
  string theme = 2;
  string tray_icon_style = 3;
  bool auto_reconnect = 4;
  bool kill_switch = 5;
  bool dns_protection = 6;
  string log_level = 7;
  bool auto_start = 8;
  string auto_connect_tunnel = 9;
}

message GetSettingsRequest {}
message SaveSettingsResponse {}

// --- Firewall ---

message SetKillSwitchRequest {
  bool enabled = 1;
}
message SetKillSwitchResponse {}

message SetDNSProtectionRequest {
  bool enabled = 1;
}
message SetDNSProtectionResponse {}

// --- Daemon ---

message PingRequest {}
message PingResponse {
  string version = 1;
  string status = 2;
}

message ShutdownRequest {}
message ShutdownResponse {}
