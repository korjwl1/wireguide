name: Release

# Fires on annotated/lightweight tags shaped like vX.Y.Z (or vX.Y.Z-foo).
# The four build jobs run in parallel; the final `release` job collects
# every artifact, generates SHA256SUMS, and attaches them all to the
# GitHub Release the tag triggers.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed by softprops/action-gh-release to upload assets

jobs:
  build-macos:
    name: macOS arm64
    # arm64 only. Intel macs are a vanishing share of the target
    # audience and shipping a CGO/.m cross-compile from arm64 (or
    # standing up a parallel macos-13 runner) costs more in CI
    # complexity than it returns in coverage. Intel users can still
    # build from source.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wails3 + task
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build .app bundle (ad-hoc signed)
        # darwin:package does: build:native → create:app:bundle →
        # codesign:adhoc.
        run: wails3 task darwin:package ARCH=arm64

      - name: Archive .app
        # ditto preserves macOS metadata (extended attributes, symlinks,
        # the codesign signature) better than plain `zip -ry`. The
        # resulting .zip stays Gatekeeper-quarantine-friendly.
        run: |
          cd bin
          ditto -c -k --sequesterRsrc --keepParent wireguide.app "WireGuide-darwin-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: bin/WireGuide-darwin-arm64.zip
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Windows ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: windows-latest  # x86_64 host; cross-compiles arm64 fine (no cgo)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wails3 + task
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/go-task/task/v3/cmd/task@latest
          # Append, don't overwrite — PATH already has system entries.
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install NSIS + add to PATH
        # NSIS used to ship preinstalled on windows-latest runners but is
        # no longer on the default PATH (and may not be in the image at
        # all on newer windows-2025 builds), so wails3's NSIS packager
        # exits 127 with "makensis: executable file not found".
        # `choco install -y nsis` is idempotent — a no-op if already
        # present — and we explicitly add the bin dir to GITHUB_PATH so
        # the subsequent step's child processes (go-task → makensis)
        # find it without depending on choco's PATH refresh behavior.
        shell: pwsh
        run: |
          choco install -y nsis --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Build .exe + NSIS installer
        # Our Windows binary is pure-syscall (no cgo) so CGO_ENABLED=0
        # is correct. vendor:wintun pulls the pinned wintun.dll into bin/.
        run: wails3 task windows:package ARCH=${{ matrix.arch }}

      - name: Rename installer to canonical asset name
        shell: bash
        # project.nsi's OutFile writes to bin/wireguide-${ARCH}-installer.exe
        # (ARCH set by wails_tools.nsh to "amd64" or "arm64"). v0.3.0 used
        # `find ... | head -1` here and picked up build/windows/nsis/
        # MicrosoftEdgeWebview2Setup.exe — the embedded WebView2 bootstrapper —
        # instead of the real installer, shipping a 1.7MB "installer" that
        # just installed WebView2 and exited. Path is deterministic; address
        # it directly.
        run: |
          set -e
          src="bin/wireguide-${{ matrix.arch }}-installer.exe"
          if [ ! -f "$src" ]; then
            echo "ERROR: NSIS installer not found at $src"
            find build/windows bin -type f
            exit 1
          fi
          mv "$src" "bin/WireGuide-windows-${{ matrix.arch }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: bin/WireGuide-windows-${{ matrix.arch }}.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs the full history + all tags to compute the
          # commit range since the previous release. Shallow clone (the
          # default) only fetches the tag's commit and CHANGELOG comes
          # out empty.
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true  # flattens 4 sub-dirs into one folder

      - name: Generate SHA256SUMS
        # Matches the format internal/update/checker.go expects (GNU
        # coreutils two-space layout). The checker's signature path
        # also looks for SHA256SUMS.sig next to this file — skipped
        # for now because we have no signing key wired up in CI yet.
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes with git-cliff
        # GitHub's built-in generate_release_notes only enumerates merged
        # PRs — most of our work lands as direct pushes to main, so the
        # auto-generated body was nearly empty (v0.3.0 shipped showing
        # one bullet despite ~30 commits). git-cliff reads the actual
        # git log, grouped by subject-line prefix per cliff.toml.
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true

  update-cask:
    name: Update homebrew-tap cask (arm64)
    needs: release
    # Skip on pre-release tags (vX.Y.Z-rc1, etc.) — those shouldn't bump
    # the stable cask. Skip if TAP_PUSH_TOKEN isn't configured so a fork
    # without a homebrew-tap secret doesn't fail the whole pipeline.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check token is present
        id: check_token
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_PUSH_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN secret not set; skipping cask update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout homebrew-tap
        if: steps.check_token.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: korjwl1/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap

      - name: Download arm64 artifact
        if: steps.check_token.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dl

      - name: Compute sha256 + rewrite cask
        if: steps.check_token.outputs.skip == 'false'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          # Strip the leading 'v' from vX.Y.Z so the cask `version` line
          # matches Homebrew convention.
          version="${TAG#v}"
          sha256=$(sha256sum dl/WireGuide-darwin-arm64.zip | awk '{print $1}')
          cask="tap/Casks/wireguide.rb"

          # Heredoc-rewrite the whole cask in one shot. Doing it via sed
          # against the old file would chain three fragile regex edits
          # (version line, sha256 line, url filename — the old file says
          # "macOS-arm64", we want "darwin-arm64"). Easier and safer to
          # just regenerate the bits that change. Everything *outside*
          # the version/sha256/url block stays byte-identical.
          cat > "$cask" <<EOF
          cask "wireguide" do
            version "$version"
            sha256 "$sha256"

            url "https://github.com/korjwl1/wireguide/releases/download/v#{version}/WireGuide-darwin-arm64.zip"
            name "WireGuide"
            desc "Cross-platform WireGuard VPN desktop client"
            homepage "https://github.com/korjwl1/wireguide"

            depends_on macos: ">= :catalina"

            app "WireGuide.app"

            # auto_updates true tells \`brew upgrade\` to defer to the
            # app's own update mechanism, which prevents brew + the
            # in-app scheduler from racing to upgrade the same install
            # (the wireguide RunUpdate path also shells out to brew, so
            # without this flag a user clicking "Update Now" while brew
            # is auto-upgrading hits a lock contention).
            auto_updates true

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/WireGuide.app"]
              system_command "/usr/bin/killall",
                             args: ["wireguide"],
                             must_succeed: false
              system_command "/bin/sleep",
                             args: ["1"],
                             must_succeed: false
              system_command "/usr/bin/open",
                             args: ["#{appdir}/WireGuide.app"],
                             must_succeed: false
            end

            uninstall quit: "com.korjwl1.wireguide"

            zap launchctl: "com.wireguide.helper",
                delete: [
                  "/Library/PrivilegedHelperTools/com.wireguide.helper",
                  "/Library/LaunchDaemons/com.wireguide.helper.plist",
                ],
                trash: [
                  "~/Library/Application Support/WireGuide",
                  "~/Library/Preferences/com.korjwl1.wireguide.plist",
                  "/var/run/wireguide",
                  "/var/log/wireguide-helper.log",
                ]
          end
          EOF

      - name: Commit + push
        if: steps.check_token.outputs.skip == 'false'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Detect a no-op (rerun of the same tag) so the workflow
          # doesn't fail trying to push an empty diff.
          if git diff --quiet Casks/wireguide.rb; then
            echo "cask already up to date for ${TAG}; nothing to commit."
            exit 0
          fi
          git add Casks/wireguide.rb
          git commit -m "wireguide ${TAG}: arm64 cask bump"
          git push
