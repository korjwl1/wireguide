name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open WireGuide
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WireGuide version
      description: Check in Settings or menu bar
      placeholder: "0.1.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS Tahoe (26.x)
        - macOS Sequoia (15.x)
        - macOS Sonoma (14.x)
        - Other
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: Chip
      options:
        - Apple M1
        - Apple M2
        - Apple M3
        - Apple M4
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant output from the Log Viewer (Settings > Log Viewer)
      render: shell
