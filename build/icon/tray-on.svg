<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="64" height="64" viewBox="0 0 64 64">
  <!--
    Tray icon, connected state.
    Same W glyph as the off-state tray PNG (exactly the Wails default) with
    a small green dot tucked into the bottom-right. Rendered as a coloured
    (non-template) icon so the green survives macOS's menu-bar rendering —
    template icons are monochrome and would blacken the dot.
  -->
  <g>
    <!-- Base W bitmap, kept native size 64×64 -->
    <image x="0" y="0" width="64" height="64"
           xlink:href="data:image/png;base64,"/>
  </g>
  <!-- Connected dot: bright system green with a subtle ring so it stays
       legible on both light and dark menu bars. Position: bottom-right. -->
  <circle cx="52" cy="52" r="9" fill="#FFFFFF"/>
  <circle cx="52" cy="52" r="7.5" fill="#30D158"/>
</svg>
