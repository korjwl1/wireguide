# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "wireguide"
arch: ${GOARCH}
platform: "linux"
version: "0.1.5"
section: "default"
priority: "extra"
maintainer: ${GIT_COMMITTER_NAME} <${GIT_COMMITTER_EMAIL}>
description: "WireGuide - WireGuard VPN Client"
vendor: "WireGuide"
homepage: "https://github.com/korjwl1/wireguide"
license: "MIT"
release: "1"

contents:
  - src: "./bin/wireguide"
    dst: "/usr/local/bin/wireguide"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/wireguide.png"
  - src: "./build/linux/wireguide.desktop"
    dst: "/usr/share/applications/wireguide.desktop"
  - src: "./build/linux/polkit/com.wireguide.helper.policy"
    dst: "/usr/share/polkit-1/actions/com.wireguide.helper.policy"

# Default dependencies for Debian 12/Ubuntu 22.04+ with WebKit 4.1
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0
  - polkitd | policykit-1
  - iproute2

recommends:
  - nftables
  - wireguard-tools
  - libnotify-bin

# Distribution-specific overrides for different package formats and WebKit versions
overrides:
  # RPM packages for RHEL/CentOS/AlmaLinux/Rocky Linux (WebKit 4.1)
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
      - polkit
      - iproute
    recommends:
      - nftables
      - wireguard-tools
      - libnotify

  # Arch Linux packages (WebKit 4.1)
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1
      - polkit
      - iproute2
    recommends:
      - nftables
      - wireguard-tools
      - libnotify

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  preremove: "./build/linux/nfpm/scripts/preremove.sh"
